name: CI — Test & Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1 : Tests Laravel ─────────────────────────────────
  test:
    name: Tests PHP
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: laravel_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: rootsecret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -u laravel -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql, redis, bcmath, gd
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: app/vendor
          key: composer-${{ hashFiles('app/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        working-directory: app
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup environment
        working-directory: app
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Configure test env
        working-directory: app
        run: |
          sed -i 's/DB_HOST=mysql/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=laravel_db/DB_DATABASE=laravel_test/' .env
          sed -i 's/REDIS_HOST=redis/REDIS_HOST=127.0.0.1/' .env

      - name: Run migrations
        working-directory: app
        run: php artisan migrate --force

      - name: Run tests
        working-directory: app
        run: php artisan test --parallel

  # ─── Job 2 : Build image Docker ────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test        # bloqué si test échoue

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (sans push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile
          push: false
          tags: my-platform/app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
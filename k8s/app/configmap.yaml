# k8s/app/configmap.yaml
# Variables d'environnement

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: platform
data:
  APP_NAME: "My Platform"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "http://localhost"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "error"
  DB_CONNECTION: "mysql"
  DB_HOST: "mysql-service"
  DB_PORT: "3306"
  DB_DATABASE: "laravel_db"
  CACHE_STORE: "redis"
  SESSION_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"